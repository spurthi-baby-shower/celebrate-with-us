<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baby Shower - Spurthi Rani A &amp; Harish J</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Color Palette */
      --color-pink: #f8e8e8;
      --color-cream: #fdf6f0;
      --color-gold: #c9a84c;
      --color-gold-light: #e8d5a3;
      --color-text-primary: #4a3728;
      --color-text-secondary: #6b5344;

      /* Typography */
      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body: 'Lato', 'Segoe UI', sans-serif;

      /* Spacing */
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;

      /* Animation Timing */
      --anim-fade-duration: 1s;
      --anim-entrance-duration: 0.6s;
      --anim-stagger-delay: 0.2s;
      --anim-shimmer-duration: 4s;
      --anim-glow-duration: 3s;
      --anim-particle-duration: 8s;
      --anim-hover-duration: 0.3s;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--color-cream);
      color: var(--color-text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      opacity: 0;
      animation: fadeIn var(--anim-fade-duration) ease-out forwards;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-md);
      min-height: 60vh;
    }

    .hero-image {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(74, 55, 40, 0.1);
      margin-bottom: var(--spacing-lg);
      max-height: 50vh;
      object-fit: contain;
    }

    .event-title {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--color-gold);
      margin-top: var(--spacing-md);
    }

    .event-details {
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-md);
      max-width: 600px;
      margin: 0 auto;
    }

    .parents-names {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: var(--spacing-lg);
    }

    .detail-item {
      padding: var(--spacing-md) 0;
      border-bottom: 1px solid var(--color-gold-light);
    }

    .detail-item:last-child {
      border-bottom: none;
    }

    .detail-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-sm);
    }

    .detail-value {
      display: block;
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--color-text-primary);
    }

    .footer {
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-md);
      border-top: 1px solid var(--color-gold-light);
      margin-top: var(--spacing-lg);
    }

    .footer p {
      font-family: var(--font-body);
      font-size: 1.1rem;
      color: var(--color-text-secondary);
      font-style: italic;
    }

    /* Responsive: Tablet (600px+) */
    @media (min-width: 600px) {
      .event-title {
        font-size: 3rem;
      }

      .parents-names {
        font-size: 2.2rem;
      }

      .detail-value {
        font-size: 1.5rem;
      }

      .hero {
        padding: var(--spacing-xl) var(--spacing-lg);
      }
    }

    /* Responsive: Desktop (1024px+) */
    @media (min-width: 1024px) {
      body {
        max-width: 1200px;
        margin: 0 auto;
      }

      .event-title {
        font-size: 3.5rem;
      }

      .parents-names {
        font-size: 2.5rem;
      }

      .hero {
        min-height: 70vh;
      }

      .hero-image {
        max-width: 80%;
      }
    }

    /* Page fade-in animation */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Section entrance animations */
    .content-section {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity var(--anim-entrance-duration) ease-out, transform var(--anim-entrance-duration) ease-out;
    }

    .content-section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Staggered delays */
    .content-section[data-delay="0"] { transition-delay: 0s; }
    .content-section[data-delay="1"] { transition-delay: 0.2s; }
    .content-section[data-delay="2"] { transition-delay: 0.4s; }

    /* Gold accent glow and shimmer */
    @keyframes glowPulse {
      0%, 100% { text-shadow: 0 0 8px rgba(201, 168, 76, 0.3); }
      50% { text-shadow: 0 0 16px rgba(201, 168, 76, 0.6); }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .gold-accent {
      color: var(--color-gold);
      background: linear-gradient(90deg, var(--color-gold) 0%, var(--color-gold-light) 50%, var(--color-gold) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer var(--anim-shimmer-duration) linear infinite, glowPulse var(--anim-glow-duration) ease-in-out infinite;
    }

    /* Hover transitions */
    .detail-item,
    .gold-accent,
    .footer p {
      transition: transform var(--anim-hover-duration) ease, color var(--anim-hover-duration) ease, text-shadow var(--anim-hover-duration) ease;
    }

    .detail-item:hover {
      transform: scale(1.02);
    }

    .gold-accent:hover {
      text-shadow: 0 0 20px rgba(201, 168, 76, 0.8);
    }

    .footer p:hover {
      color: var(--color-text-primary);
    }

    /* Floating particles */
    @keyframes floatUp {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% {
        transform: translateY(-20px) translateX(20px);
        opacity: 0;
      }
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--color-gold-light);
      border-radius: 50%;
      animation: floatUp var(--anim-particle-duration) linear infinite;
      opacity: 0;
      left: 5%;
    }

    .particle:nth-child(2) { left: 15%; animation-delay: 1s; animation-duration: 10s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 2s; animation-duration: 7s; }
    .particle:nth-child(4) { left: 45%; animation-delay: 0.5s; animation-duration: 9s; }
    .particle:nth-child(5) { left: 60%; animation-delay: 3s; animation-duration: 11s; }
    .particle:nth-child(6) { left: 75%; animation-delay: 1.5s; animation-duration: 8s; }
    .particle:nth-child(7) { left: 85%; animation-delay: 2.5s; animation-duration: 10s; }
    .particle:nth-child(8) { left: 95%; animation-delay: 0.8s; animation-duration: 12s; }

    /* Reduced motion accessibility */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .content-section {
        opacity: 1;
        transform: none;
      }

      .particle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <section class="hero content-section" data-delay="0">
    <img src="image.png" alt="Baby shower decoration" class="hero-image">
    <h1 class="event-title gold-accent">Baby Shower</h1>
  </section>
  <section class="event-details content-section" data-delay="1">
    <p class="parents-names gold-accent">Spurthi Rani A &amp; Harish J</p>
    <div class="detail-item">
      <span class="detail-label">Date</span>
      <span class="detail-value">July 6, 2026</span>
    </div>
    <div class="detail-item">
      <span class="detail-label">Time</span>
      <span class="detail-value">10 AM</span>
    </div>
    <div class="detail-item">
      <span class="detail-label">Venue</span>
      <span class="detail-value">Samudhaya Bhavana, Challakere</span>
    </div>
  </section>
  <footer class="footer content-section" data-delay="2">
    <p>We look forward to celebrating with you!</p>
  </footer>
  <div class="particles" aria-hidden="true">
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
    <span class="particle"></span>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var sections = document.querySelectorAll('.content-section');
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });
        sections.forEach(function(section) { observer.observe(section); });
      } else {
        sections.forEach(function(section) { section.classList.add('visible'); });
      }
    });
  </script>
</body>
</html>
